<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fren v4 · dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
  <!-- HTMX vendored locally — the dashboard runs on a LAN box with no guaranteed
       internet; a CDN <script> in <head> would block/stall rendering. defer so it
       never blocks the (already server-rendered) content. -->
  <script src="/static/htmx.min.js" defer></script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">fren v4 · monitor</a>
    {% block topnav %}{% endblock %}
    <span class="muted">read-only · auto-refresh 10s</span>
  </header>
  {% block body %}{% endblock %}
</body>
</html>
