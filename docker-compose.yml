name: fren-v4

x-backend: &backend
  build:
    context: .
    dockerfile: backend/Dockerfile
  # All credentials + config flow from the gitignored .env (copied from v3).
  # PYTHONPATH makes the mounted framework importable.
  env_file: .env
  depends_on:
    db:
      condition: service_healthy
  volumes:
    - fren_v4_data:/data
    - ../OpenCodeCompilerV2:/srv/oac:ro   # framework as a sibling, importable
  restart: unless-stopped
  # Run tini as PID 1 so detached fire-and-forget subprocesses (the persona
  # drift hooks: personality_core / vibe_drift / user_mood) are REAPED instead
  # of piling up as zombies. Without a reaper, PID-1 python leaks zombies until
  # fork() stalls and the event loop freezes (bot hung silent ~2h on 2026-06-09).
  init: true

services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${FREN_DB_PORT:-5453}:5432"
    volumes:
      - fren_v4_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Primary surface: the Telegram bot (runs migrations + fleet compile at boot).
  bot:
    <<: *backend
    environment:
      PYTHONPATH: /srv/oac:/app:/app/backend
      AGENTS_DIR: ${AGENTS_DIR:-/data/agents}
      SERVICE: bot
    # Host webcam/desk-camera devices for the camera_capture tool (twily_selfie /
    # persona_media). Without these the container has no /dev/video* and ffmpeg's
    # v4l2 capture fails. Note: if the host has no camera, comment these out or the
    # bot won't start.
    devices:
      - /dev/video0:/dev/video0
      - /dev/video1:/dev/video1
      - /dev/video2:/dev/video2
      - /dev/video3:/dev/video3

  # Autonomous cron-driven agent runner.
  scheduler:
    <<: *backend
    environment:
      PYTHONPATH: /srv/oac:/app:/app/backend
      AGENTS_DIR: ${AGENTS_DIR:-/data/agents}
      SERVICE: scheduler
    depends_on:
      db:
        condition: service_healthy
      bot:
        condition: service_started

  # Periodic intervention checker.
  checker:
    <<: *backend
    environment:
      PYTHONPATH: /srv/oac:/app:/app/backend
      AGENTS_DIR: ${AGENTS_DIR:-/data/agents}
      SERVICE: checker
    depends_on:
      db:
        condition: service_healthy
      bot:
        condition: service_started

  # NOTE: the opencode-web raw session viewer (port 4098) was retired. Agent
  # runs now use a PRIVATE per-run XDG_DATA_HOME that is cleaned up after each run
  # (the fix for opencode's "database is locked" under concurrency), so there is
  # no longer a shared session store for it to browse. The DB-backed dashboard
  # below (port 8090) is the monitoring surface: it reads execution_runs +
  # run_trace artifacts, so it shows every run's status, full chronological
  # trajectory, tool calls and persona decision regardless of opencode state.

  # Read-only monitoring dashboard (FastAPI + Jinja2 + HTMX). Browse what the
  # agents are doing: proactive persona_response messages, agent runs, the
  # context they're fed (digest / inner_monologue / emotional_state / activity),
  # the chat, and a health strip. Auto-refreshes every 10s. Never writes the DB.
  # Open http://<host>:8090
  web:
    <<: *backend
    environment:
      PYTHONPATH: /srv/oac:/app:/app/backend
      AGENTS_DIR: ${AGENTS_DIR:-/data/agents}
      SERVICE: web
    ports:
      - "8090:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  fren_v4_db_data:
  fren_v4_data:
