name: fren-v4

x-backend: &backend
  build:
    context: .
    dockerfile: backend/Dockerfile
  # All credentials + config flow from the gitignored .env (copied from v3).
  # PYTHONPATH makes the mounted framework importable.
  env_file: .env
  depends_on:
    db:
      condition: service_healthy
  volumes:
    - fren_v4_data:/data
    - ../OpenCodeCompilerV2:/srv/oac:ro   # framework as a sibling, importable
  restart: unless-stopped

services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${FREN_DB_PORT:-5453}:5432"
    volumes:
      - fren_v4_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Primary surface: the Telegram bot (runs migrations + fleet compile at boot).
  bot:
    <<: *backend
    environment:
      PYTHONPATH: /srv/oac:/app:/app/backend
      AGENTS_DIR: ${AGENTS_DIR:-/data/agents}
      SERVICE: bot

  # Autonomous cron-driven agent runner.
  scheduler:
    <<: *backend
    environment:
      PYTHONPATH: /srv/oac:/app:/app/backend
      AGENTS_DIR: ${AGENTS_DIR:-/data/agents}
      SERVICE: scheduler
    depends_on:
      db:
        condition: service_healthy
      bot:
        condition: service_started

  # Periodic intervention checker.
  checker:
    <<: *backend
    environment:
      PYTHONPATH: /srv/oac:/app:/app/backend
      AGENTS_DIR: ${AGENTS_DIR:-/data/agents}
      SERVICE: checker
    depends_on:
      db:
        condition: service_healthy
      bot:
        condition: service_started

volumes:
  fren_v4_db_data:
  fren_v4_data:
