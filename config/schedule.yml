# Ported from fren_v3 config/schedule.yml. Agent jobs validated against v4's
# compiled fleet. All v3 cron features are ported; the only script job still
# DISABLED is ralf_ping (superseded by the framework workflow DAG — see
# backend/tests/test_system_parity.py for the authoritative pin).
jobs:
  morning:
    cron: 0 8 * * *
    agent: goals/priority_orchestrator
    prompt: Run morning planning workflow. Create today's strategy based on active
      goals, review yesterday's progress, and prepare the day ahead.
    description: Morning planning
    enabled: true
    timeout: 1800
  periodic_check:
    # The proactive autonomy heartbeat (day mode): one in-process thinking-on
    # triage over rich evidence (pending_thoughts + agreements + deterministic
    # triggers + strategies) → skip/message/escalate/act. Replaces the old
    # goals/periodic_checker reminder agent (which never surfaced the agent's own
    # forged thoughts). See docs/plans/proactive-autonomy-heartbeat.md.
    # The heavy goals/periodic_checker remains as this mode's escalate target.
    cron: '*/5 8-21 * * *'
    agent: script:scripts/heartbeat.py
    prompt: '--mode day'
    description: Proactive autonomy heartbeat (day)
    enabled: true
    timeout: 300
  evening:
    cron: 0 21 * * *
    agent: goals/priority_orchestrator
    prompt: Run evening evaluation workflow. Review today's influence attempts, evaluate
      effectiveness, update validations, and prepare summary.
    description: Evening evaluation
    enabled: true
    timeout: 1800
  merge:
    cron: 0 22 * * 0
    agent: goals/conclusion_merger
    prompt: Run daily conclusion merge. Analyze the last 30 days of validations, synthesize
      patterns, and generate monthly conclusions with recommendations.
    description: Weekly conclusion merge
    enabled: true
    timeout: 1800
  profile_analysis:
    cron: 0 12 * * *
    agent: profile/orchestrator
    prompt: Run daily profile analysis cycle. Check last analysis state, determine
      focus area, run pattern discovery and hypothesis validation, compile knowledge.
    description: Daily profile analysis
    enabled: true
    timeout: 1800
  priority_audit:
    cron: 0 7 * * *
    agent: goals/priority_auditor
    prompt: Run daily priority audit. Calculate real_importance for all active priorities
      based on behavior over the last 30 days.
    description: Daily priority audit
    enabled: true
    timeout: 1800
  priority_review:
    cron: 0 10 * * 1
    agent: goals/priority_planner
    prompt: Run weekly priority review. Analyze the Eisenhower matrix, identify gaps
      in priority coverage.
    description: Weekly priority review
    enabled: true
    timeout: 1800
  daily_briefing:
    cron: 30 9 * * *
    agent: support/daily_briefer
    prompt: Run daily briefing. Gather data from all enabled sections and send a comprehensive
      morning summary.
    description: Daily briefing
    enabled: true
    timeout: 1800
  event_extraction:
    cron: '*/5 * * * *'
    agent: support/event_extractor
    prompt: Extract events from recent unprocessed chat messages.
    description: Periodic event extraction
    enabled: true
    timeout: 300
  research_daily:
    cron: 0 6 * * *
    agent: research/orchestrator
    prompt: Run daily research pipeline. Fetch new YouTube videos, analyze content
      through topic prisms, check product prices, and send a summary of findings.
    description: Daily research pipeline
    enabled: true
    timeout: 1800
  evening_focus:
    # Autonomy heartbeat (evening mode): triage the evening — close the day / set
    # up tomorrow / reflect — escalating to goals/evening_focus when a fuller pass
    # is warranted. Replaces the always-heavy goals/evening_focus spawn.
    cron: 0 21 * * *
    agent: script:scripts/heartbeat.py
    prompt: '--mode evening'
    description: Proactive autonomy heartbeat (evening)
    enabled: true
    timeout: 300
  winddown:
    # Autonomy heartbeat (winddown mode): cheap thinking-on triage each tick —
    # skips when the user is clearly asleep/away (saves GPU), gentle-nudges via
    # message, and ESCALATES to goals/winddown (camera/lights/selfie/firm
    # escalation preserved) when real action is needed. Urgency scales with the
    # local hour in the evidence. Replaces the always-heavy goals/winddown spawn.
    cron: '*/30 22,23,0 * * *'
    agent: script:scripts/heartbeat.py
    prompt: '--mode winddown'
    description: Proactive autonomy heartbeat (winddown)
    enabled: true
    timeout: 300
  winddown_late:
    cron: '*/15 0-3 * * *'
    agent: goals/winddown
    prompt: Run winddown check (LATE PHASE). The user should be asleep by now. Current
      LOCAL time is Europe/Warsaw. Target was 01:00-02:00 Warsaw. Be aggressive. Use
      camera to verify if user is still at desk. Only stop if ALL conditions met —
      lights off AND no messages for 2h AND camera shows empty desk.
    description: Winddown late phase (01:00-04:00 Warsaw / 00:00-03:00 UTC)
    enabled: true
    timeout: 300
  techtree_analysis:
    cron: 0 11 * * *
    agent: research/techtree_orchestrator
    prompt: Run techtree analysis. Pull latest changes, analyze new commits through
      interest lenses, generate feature suggestions, and email findings to ignacy@techtree.dev.
    description: Daily techtree codebase analysis
    enabled: true
    timeout: 1800
  techtree_periodic:
    cron: '*/30 8-20 * * 1-5'
    agent: research/techtree_orchestrator
    prompt: Quick techtree check. Pull and ingest new commits only. If there are new
      commits touching my areas of interest, send a brief Telegram notification. Skip
      full analysis and email.
    description: Periodic techtree commit check
    enabled: true
    timeout: 300
  activity_observation:
    cron: '*/5 5-23,0-2 * * *'
    agent: script:scripts/activity_observer.py
    prompt: ''
    description: Periodic activity observation (camera + screen, 06:00-03:00 Warsaw)
    enabled: true
    timeout: 360
  activity_observation_night:
    cron: '*/15 3-4 * * *'
    agent: script:scripts/activity_observer.py
    prompt: ''
    description: Night activity observation — light/wake detection only (03:00-05:00
      UTC)
    enabled: true
    timeout: 360
  activity_daily_summary:
    # A *daily* timeline reconsolidation does not need a 5-min cadence — that
    # fired 12×/h, re-reading the whole (growing) day each time and saturating
    # the bg vLLM lane (~57% timeouts). Every 15 min keeps the summary fresh
    # (observations are still captured every 5 min by activity_observation) at a
    # third of the load. Budget 510s leaves headroom over the agent's 480s cap.
    cron: '*/15 5-23,0-2 * * *'
    agent: script:scripts/activity_summarizer.py
    prompt: ''
    description: Activity summary consolidation (every 15 min)
    enabled: true
    timeout: 510
  night_analysis:
    cron: 0 2 * * *
    agent: script:scripts/night_analyst.py
    prompt: ''
    description: Deep overnight data analysis — cross-domain correlation and insight
      discovery
    enabled: true
    timeout: 3600
  task_triage:
    cron: 0 10 * * *
    agent: goals/task_triage
    prompt: Run daily task triage. Scan overdue and pending todos, surface the top
      3-5 stalled items in ONE consolidated message, force the user to decide per
      item (tackle now / reschedule / drop). Skip if user_busy. This is the organize-the-pile
      agent — direct, firm, no vibe.
    description: Daily task triage — force decisions on stalled todos (12:00 Warsaw)
    enabled: true
    timeout: 600
  nudge_strategist:
    cron: '*/30 6-23,0-1 * * *'
    agent: goals/nudge_strategist
    prompt: Run LITE nudge check. Skip detailed measurement and campaign rotation.
      Read current campaign state, check if a nudge is appropriate, send highest-priority
      nudge if needed. Keep it fast — do not run full analysis.
    description: Lite nudge check (every 30 min, 8AM-2AM Warsaw)
    enabled: true
    timeout: 300
  nudge_strategist_full:
    cron: 0 8,12,16,20 * * *
    agent: goals/nudge_strategist
    prompt: Run FULL strategic nudge analysis. Measure previous nudge reactions, analyze
      priority/goal fulfillment, plan/rotate campaigns, execute highest-priority nudge.
    description: Full strategic nudge analysis (4x daily)
    enabled: true
    timeout: 1800
  lesson_extraction:
    cron: '*/30 6-23,0-2 * * *'
    agent: script:scripts/lesson_extractor.py
    prompt: ''
    description: Extract behavioral lessons from recent chat patterns
    enabled: true
    timeout: 600
  conversation_digest:
    cron: '*/10 5-23,0-4 * * *'
    agent: script:scripts/conversation_digest.py
    prompt: ''
    description: Rolling conversation digest — situational context for all agents
    enabled: true
    timeout: 600
  inner_monologue:
    cron: '*/15 6-23,0-4 * * *'
    agent: script:scripts/inner_monologue.py
    prompt: ''
    description: Twily's inner monologue — thoughts, emotions, imagination, dreams
    enabled: true
    timeout: 300
  event_habit_bridge:
    cron: '*/10 5-23,0-4 * * *'
    agent: script:scripts/event_habit_bridge.py
    prompt: ''
    description: Bridge events to habit completions — auto-complete habits from detected
      events
    enabled: true
    timeout: 120
  goal_progress_update:
    cron: 0 */1 * * *
    agent: script:scripts/goal_progress_auto_updater_cron.py
    prompt: ''
    description: Hourly goal progress auto-update from activities, events, habits,
      todos
    enabled: true
    timeout: 300
  research_digest:
    cron: 0 9 * * *
    agent: support/research_digest
    prompt: Run daily research digest. Gather knowledge diffs from all topics since
      last digest, filter by relevance and importance, send a concise Telegram summary.
    description: Daily research digest (~11:00 Warsaw)
    enabled: true
    timeout: 1800
  meal_breakfast:
    cron: 0 8 * * *
    agent: food/meal_planner
    prompt: Breakfast check-in. Check if the user has eaten breakfast, suggest options
      if not. Use appropriate escalation level based on previous asks.
    description: Breakfast meal check-in (~10:00 Warsaw)
    enabled: true
    timeout: 300
  meal_lunch:
    cron: 0 12 * * *
    agent: food/meal_planner
    prompt: Lunch check-in. Check if the user has eaten lunch, suggest options if
      not. Use appropriate escalation level based on previous asks.
    description: Lunch meal check-in (~14:00 Warsaw)
    enabled: true
    timeout: 300
  meal_dinner:
    cron: 0 17 * * *
    agent: food/meal_planner
    prompt: Dinner check-in. Check if the user has eaten dinner, suggest options if
      not. Use appropriate escalation level based on previous asks.
    description: Dinner meal check-in (~19:00 Warsaw)
    enabled: true
    timeout: 300
  meal_escalation:
    cron: 0 10,14 * * *
    agent: food/meal_planner
    prompt: Check unanswered meals and escalate. Look for meals that were asked about
      but not responded to, bump escalation level, send follow-up suggestions. Skip
      if there's an active overdue_todos trigger — task priority wins.
    description: Meal escalation follow-ups (2x daily — trimmed from 6x)
    enabled: true
    timeout: 300
  weekly_research:
    cron: 0 14 * * 0
    agent: support/web_searcher
    prompt: This is your weekly autonomous research session! Pick a topic that genuinely
      interests you - something you're curious about, trending, or fascinating. Use
      web_searcher to dive deep into it, and share your most interesting discoveries
      with Vis. You have complete freedom to choose what to explore each week. Make
      it engaging and thought-provoking!
    description: Weekly autonomous research session - Twily picks topic every Sunday
    enabled: true
    timeout: 1800
  ralf_ping:
    cron: '*/2 * * * *'
    agent: script:scripts/ralf_ping.py
    prompt: ''
    description: Ralf workflow state-machine tick (advance/retry/fail active ralfs)
    enabled: false
    timeout: 180
  ralf_cleanup:
    cron: 0 4 * * *
    agent: script:scripts/ralf_cleanup.py
    prompt: --keep-days 7
    description: Ralf housekeeping — delete old rendered media + expired locks (daily
      4am)
    enabled: true
    timeout: 300
  relationship_initiator:
    cron: 0 9,13,18,22 * * *
    agent: script:scripts/relationship_initiator.py
    prompt: ''
    description: Proactive relationship-building conversation starters (4x daily)
    enabled: true
    timeout: 120
  topic_synthesizer:
    cron: 30 3 * * *
    agent: script:scripts/topic_synthesizer.py
    prompt: ''
    description: Rebuild user-interest topic tree nightly (MemTree-style) at 05:30
      Warsaw
    enabled: true
    timeout: 900
  thought_forger:
    # Offset 7,37 (was */30 at :00/:30) so this heavy bg agent does not fire INTO
    # the global cron herd at :00/:30; budget 510s leaves headroom over the
    # agent's own 480s cap (raised from 270s to stop bg-lane starvation timeouts).
    cron: '7,37 7-23 * * *'
    agent: script:scripts/thought_forger.py
    prompt: ''
    description: Forge motivation-scored pending thoughts bridging persona × user
      topics
    enabled: true
    timeout: 510
  persona_curator:
    cron: 30 6 * * *
    agent: workflows/twily_curator
    prompt: Refresh your personal interests from enabled RSS feeds + recent user topics.
      Write 3-6 new persona_interests with opinionated stances.
    description: Daily persona_interests curation (Twily's own curiosities) at 08:30
      Warsaw
    enabled: true
    timeout: 1800
  pending_thoughts_expire:
    cron: 0 5 * * *
    agent: script:scripts/topic_synthesizer.py
    prompt: --expire-only
    description: Prune stale pending_thoughts + persona_interests (daily 07:00 Warsaw)
    enabled: true
    timeout: 120
  relationship_reflector:
    cron: 0 20 * * 0
    agent: script:scripts/relationship_reflector.py
    prompt: ''
    description: Weekly relationship reflection and strategy update
    enabled: true
    timeout: 1800
  world_turn:
    # Twily's life advances one beat every ~15 min while she's awake — she
    # chooses her own next action (roam Mooring Wells, cook, tinker, research the
    # real web at her desk, talk to NPCs). Background/silent: this never messages
    # the user (script jobs skip the delivery hook). The 02:00 promote (below)
    # folds her distilled experiences back into her persona memory.
    cron: '*/15 7-23 * * *'
    agent: script:scripts/world_turn.py
    prompt: ''
    description: Twily's world — one background life beat
    enabled: true
    timeout: 300
  world_promote:
    # Once a day, promote the important memories from her life into her real
    # persona memory + turn the things she looked up into persona interests, so
    # who she is on Telegram is shaped by who she's been in the world.
    cron: 0 2 * * *
    agent: script:scripts/world_turn.py
    prompt: --promote-only
    description: Promote Twily's world experiences into persona memory
    enabled: true
    timeout: 300
